name: Déploiement Coolify

# Déclenche un déploiement Coolify à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # permet aussi un déclenchement manuel depuis GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le déploiement Coolify
        run: |
          curl --fail --silent --show-error \
            --request GET \
            'http://187.124.54.146:8000/api/v1/deploy?uuid=z8z92kmfsxpv6grfl1lapqx1&force=false' \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
