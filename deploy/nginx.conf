# =============================================================================
# Configuration nginx pour [Shift] Académie (reverse proxy vers Next.js)
# À copier dans : /etc/nginx/sites-available/shift-academie
# L'app Next.js tourne sur http://localhost:3000 (lancée par pm2).
#
# NB : après avoir lancé certbot (HTTPS), certbot modifiera automatiquement
# ce fichier pour ajouter le bloc HTTPS (port 443) et la redirection.
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name shift-academie.fr www.shift-academie.fr;

    # Taille max des envois (formulaires)
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache long pour les assets statiques de Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
